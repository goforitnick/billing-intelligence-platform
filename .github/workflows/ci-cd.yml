name: CI/CD Pipeline - Billing Intelligence Platform

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [ staging, production ]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_NAME: billing-platform-cluster

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # JOB 1: Code Quality & Security Analysis
  # ============================================================
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: |
          cd backend
          mvn checkstyle:check -q

      - name: Run SpotBugs
        run: |
          cd backend
          mvn spotbugs:check -q

      - name: OWASP Dependency Check
        run: |
          cd backend
          mvn org.owasp:dependency-check-maven:check -q
        continue-on-error: true

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: backend/target/dependency-check-report.html

  # ============================================================
  # JOB 2: Build & Test Backend Services
  # ============================================================
  test-backend:
    name: Test Backend Services
    runs-on: ubuntu-latest
    needs: code-quality

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: billing_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        service: [ billing-service, invoice-service, payment-service, analytics-service ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests - ${{ matrix.service }}
        run: |
          cd backend/${{ matrix.service }}
          mvn test -pl . --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: billing_test
          DB_USERNAME: test_user
          DB_PASSWORD: test_pass
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Generate Coverage Report
        run: |
          cd backend/${{ matrix.service }}
          mvn jacoco:report --no-transfer-progress

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/${{ matrix.service }}/target/site/jacoco/jacoco.xml
          flags: ${{ matrix.service }}
          token: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================
  # JOB 3: Build & Test Frontend
  # ============================================================
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint check
        run: |
          cd frontend
          npm run lint

      - name: Run unit tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false

      - name: Build production bundle
        run: |
          cd frontend
          npm run build
        env:
          REACT_APP_API_URL: https://api.billing.io/v1
          REACT_APP_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

  # ============================================================
  # JOB 4: Docker Build & Push
  # ============================================================
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ test-backend, test-frontend ]
    if: github.event_name != 'pull_request'

    strategy:
      matrix:
        service:
          - name: billing-service
            context: backend/billing-service
          - name: invoice-service
            context: backend/invoice-service
          - name: analytics-service
            context: backend/analytics-service
          - name: frontend
            context: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image-tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/billing/${{ matrix.service.name }}:${{ steps.image-tag.outputs.TAG }}
            ${{ env.ECR_REGISTRY }}/billing/${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ============================================================
  # JOB 5: Deploy to Staging
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.billing.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}-staging

      - name: Deploy with Helm
        run: |
          helm upgrade --install billing-platform ./infrastructure/helm \
            --namespace staging \
            --create-namespace \
            --set global.imageTag=${GITHUB_SHA::8} \
            --set global.environment=staging \
            --values ./infrastructure/helm/values-staging.yaml \
            --wait \
            --timeout 10m

      - name: Run smoke tests
        run: |
          ./scripts/smoke-tests.sh https://staging.billing.io

  # ============================================================
  # JOB 6: Deploy to Production
  # ============================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://app.billing.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy with Helm (Blue-Green)
        run: |
          IMAGE_TAG=${GITHUB_REF#refs/tags/}
          helm upgrade --install billing-platform ./infrastructure/helm \
            --namespace production \
            --set global.imageTag=$IMAGE_TAG \
            --set global.environment=production \
            --values ./infrastructure/helm/values-production.yaml \
            --wait \
            --timeout 15m

      - name: Run production smoke tests
        run: |
          ./scripts/smoke-tests.sh https://app.billing.io

      - name: Notify deployment success
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Billing Platform ${{ github.ref_name }} deployed to production successfully!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
